{% extends "base.html" %} {% block content %}
<h1>Delete Resource</h1>
<p>Are you sure you want to delete "{{ object.title }}"?</p>

<form method="post">
  {% csrf_token %}
  <button type="submit">Yes, delete</button>
</form>

<p><a href="{% url 'resource-detail' object.id %}">Cancel</a></p>
{% endblock %}
