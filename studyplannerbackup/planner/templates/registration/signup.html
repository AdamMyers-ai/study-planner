{% extends "base.html" %} {% block content %}
<h1>Sign Up</h1>

{% if error_message %}
<p>{{ error_message }}</p>
{% endif %}

<form method="post">
  {% csrf_token %} {{ form.as_p }}
  {% if next %}
  <input type="hidden" name="next" value="{{ next }}" />
  {% endif %}
  <button type="submit">Sign Up</button>
</form>
{% endblock %}
